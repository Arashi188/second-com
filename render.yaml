services:
  - type: web
    name: second-com
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: second-com-db
          property: connectionString
      - key: WHATSAPP_NUMBER
        value: "2347088028747"
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        value: "admin123"
      - key: ADMIN_EMAIL
        value: "admin@example.com"

databases:
  - name: second-com-db
    databaseName: mydb
    user: myuser